name: Validate
on: [push, pull_request]

jobs:
  syntax:
    name: Bash Syntax Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Check bash syntax
        run: |
          bash -n install.sh
          for f in lib/*.sh data/*.sh; do
            bash -n "$f" || exit 1
          done
          echo "All files pass syntax check"

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: command -v shellcheck >/dev/null || sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          shellcheck -x -S warning -e SC2034,SC2329,SC1091 install.sh lib/*.sh

  dry-run:
    name: Dry Run (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install Bash 5 (macOS)
        if: runner.os == 'macOS'
        run: brew install bash
      - name: Dry run
        shell: bash
        timeout-minutes: 5
        run: |
          if [[ "${RUNNER_OS}" == "macOS" ]]; then
            DRY_RUN=1 /opt/homebrew/bin/bash install.sh < /dev/null
          else
            DRY_RUN=1 bash install.sh < /dev/null
          fi

  tests:
    name: BATS Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install BATS
        run: command -v bats >/dev/null || sudo apt-get install -y bats
      - name: Run tests
        run: bats tests/
